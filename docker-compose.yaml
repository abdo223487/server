services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: my_first_app
      POSTGRES_PASSWORD: "PzDuoyCJDylaXqf13-7ql5Fd3MBOgRAJ"
    volumes:
      - my_first_app_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "WeEea9xRwtAYHHe8UH9_-iqEJoL1fkIT"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: my_first_app_test
      POSTGRES_PASSWORD: "PzDuoyCJDylaXqf13-7ql5Fd3MBOgRAJ"
    volumes:
      - my_first_app_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "WXU0YjLQAqXicVskX6tnbB2txr892GZo"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  my_first_app_data:
  my_first_app_test_data:
